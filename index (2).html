<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Enhancements Demo</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image:
                url("https://via.placeholder.com/120"),
                url("https://via.placeholder.com/100"),
                linear-gradient(to right, #4facfe, #00f2fe);

            background-repeat: no-repeat, no-repeat, no-repeat;
            background-position: top left, bottom right, center;
            background-size: 120px, 100px, cover;
        }

        .header {
            text-align: center;
            padding: 20px;
            color: white;
        }

        .container {
            width: 350px;
            margin: 50px auto;
            padding: 25px;

            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .container h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .input-box {
            width: 100%;
            padding: 10px;
            margin: 10px 0;

            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;

            border: none;
            color: white;
            background: #007bff;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);

            cursor: pointer;
        }

        .btn:hover {
            background: #0056b3;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: white;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>CSS3 Enhancement Page</h1>
</div>

<div class="container">
    <h2>Login Form</h2>

    <input type="text" class="input-box" placeholder="Enter Username">
    <input type="password" class="input-box" placeholder="Enter Password">

    <button class="btn">Login</button>
</div>

<div class="footer">
    <p>© 2026 Demo Page</p>
</div>

</body>
</html>
